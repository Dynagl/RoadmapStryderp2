<!DOCTYPE html>
<html lang="fr">
<head>

    <title>Stryde RP - Roadmap PRO</title>
    <style>
:root{
  --bg:#111318;
  --panel:#1a1f29;
  --panel-soft:#202635;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#3b82f6;
  --danger:#ef4444;
}
*{box-sizing:border-box}
body{font-family:Inter,Arial;background:var(--bg);color:var(--text);margin:0;padding:24px}
h1{text-align:center;margin-bottom:20px}

.topbar{display:flex;gap:12px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}
.btn{background:var(--panel);padding:12px 16px;border-radius:12px;cursor:pointer;font-weight:600}
.btn:hover{background:var(--panel-soft)}

.container{display:flex;flex-direction:column;gap:14px}
.category{background:var(--panel);border-radius:14px;padding:12px}
.category-title{font-size:20px;font-weight:800}
.sub{margin-left:12px;margin-top:10px;font-weight:700;color:var(--muted);cursor:pointer}
.item{display:flex;flex-direction:column;align-items:stretch;gap:10px;margin-left:22px;margin-top:6px;padding:8px;border-radius:8px;background:#00000020}
.item:hover{background:#00000035}
.item:hover:not(.item-open) .delete-btn{opacity:1}
.item-main{display:flex;align-items:center;gap:10px;cursor:pointer}
.item-main.draggable{cursor:grab}
.item-main.not-draggable{cursor:default}
.item-main.not-draggable .drag{cursor:default;opacity:0.4}
.item-text{font-weight:600;flex:1}
.drag{cursor:grab;color:#666;transition:opacity 0.15s}
.delete-btn{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;opacity:0;transition:opacity 0.15s,transform 0.15s;padding:4px 8px;border-radius:6px}
.delete-btn:hover{transform:scale(1.1);background:#ef444420}
.edit-btn{background:none;border:none;color:var(--accent);font-size:16px;cursor:pointer;opacity:0;transition:opacity 0.15s,transform 0.15s;padding:4px 8px;border-radius:6px;margin-right:2px}
.edit-btn:hover{transform:scale(1.1);background:#3b82f620}
.category-controls{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity 0.15s}
.category:hover .category-controls{opacity:1}
.sub-header{display:flex;align-items:center;gap:8px;justify-content:space-between}
.sub-header:hover .edit-btn{opacity:1}
.item-main:hover .edit-btn{opacity:1}
.green{border-left:4px solid #22c55e}
.yellow{border-left:4px solid #facc15}
.red{border-left:4px solid #ef4444}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;justify-content:center;align-items:center;z-index:1000}
.modal-content{background:var(--panel);padding:20px;border-radius:14px;width:340px;position:relative}
.close{position:absolute;top:10px;right:12px;cursor:pointer}
.input{width:100%;margin:6px 0;padding:10px;border-radius:8px;background:var(--panel-soft);border:none;color:white}
.button{margin-top:10px;padding:10px;border:none;border-radius:8px;background:var(--accent);color:white;cursor:pointer}

.swatch-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:10px}
.swatch{height:42px;border-radius:12px;border:2px solid transparent;cursor:pointer;transition:.15s transform,.15s border-color,.15s box-shadow}
.swatch:hover{transform:translateY(-1px)}
.swatch.active{border-color:#fff;box-shadow:0 0 0 3px #ffffff22}
.color-tools{display:flex;align-items:center;gap:10px;margin-top:10px}
.color-preview{flex:1;padding:10px 12px;border-radius:10px;background:var(--panel-soft);font-weight:700}
.color-picker-btn{padding:10px 12px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#f59e0b,#22c55e,#3b82f6,#a855f7);color:white;font-weight:700;cursor:pointer}
.color-native{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px}

.item-detail{margin-top:8px;padding:12px 14px;border-radius:12px;background:var(--panel-soft);color:var(--text);line-height:1.4;user-select:text;-webkit-user-select:text}
.detail-row{margin-top:8px;word-break:break-word}
.detail-label{display:block;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.detail-content{user-select:text;-webkit-user-select:text;cursor:text}

.drop-indicator{position:relative;height:18px;margin:4px 0 4px 22px}
.drop-indicator::before{content:'';position:absolute;left:0;right:0;top:8px;height:3px;border-radius:999px;background:linear-gradient(90deg,transparent,#60a5fa,#22d3ee,#60a5fa,transparent);box-shadow:0 0 12px #38bdf866}
.drop-indicator::after{content:'';position:absolute;left:0;top:3px;width:12px;height:12px;border-radius:999px;background:#e0f2fe;box-shadow:0 0 0 4px #38bdf833}

.confirm-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;justify-content:center;align-items:center;z-index:1001}
.confirm-content{background:var(--panel);padding:24px;border-radius:14px;width:320px;text-align:center}
.confirm-content h3{margin-top:0;margin-bottom:16px}
.confirm-content p{color:var(--muted);margin-bottom:20px}
.confirm-buttons{display:flex;gap:12px;justify-content:center}
.confirm-btn{padding:10px 20px;border:none;border-radius:8px;font-weight:600;cursor:pointer;flex:1}
.confirm-btn-danger{background:var(--danger);color:white}
.confirm-btn-danger:hover{background:#dc2626}
.confirm-btn-cancel{background:var(--panel-soft);color:var(--text)}
.confirm-btn-cancel:hover{background:#2a2f3f}
</style>
</head>

function selectCategoryColor(color){

function setDropIndicator(from,to,position){

to=Number(to);

}
function updateDropIndicatorOnly(){
let ctn=document.getElementById('container');
let allIndicators=ctn.querySelectorAll('.drop-indicator');
allIndicators.forEach(el=>el.remove());

if(dragState.from===null||dragState.to===null)return;

let allItems=ctn.querySelectorAll('.item');
let targetIndex=0;
allItems.forEach((item,i)=>{
if(item.dataset.itemIndex==dragState.to){
targetIndex=i;
}
});

if(targetIndex>=0&&targetIndex<allItems.length){
let targetItem=allItems[targetIndex];
if(dragState.position==='before'){
targetItem.parentNode.insertBefore(createDropIndicator(),targetItem);
}else{
if(targetItem.nextSibling){
targetItem.parentNode.insertBefore(createDropIndicator(),targetItem.nextSibling);
}else{
targetItem.parentNode.appendChild(createDropIndicator());
}
}
}

function createDropIndicator(){

fromIndex=Number(fromIndex);
toIndex=Number(toIndex);
if(Number.isNaN(fromIndex)||Number.isNaN(toIndex)||fromIndex===toIndex)return;
let arr=data.categories[categoryIndex].items;
let moved=arr.splice(fromIndex,1)[0];
if(!moved)return;
if(fromIndex<toIndex)toIndex--;
let insertIndex=position==='after'?toIndex+1:toIndex;
if(insertIndex<0)insertIndex=0;
if(insertIndex>arr.length)insertIndex=arr.length;
arr.splice(insertIndex,0,moved);
}

let pendingConfirmAction=null;

function deleteItem(categoryIndex,itemIndex){
let itemText=data.categories[categoryIndex].items[itemIndex].text;
showConfirm('Supprimer cet élément ?',`Êtes-vous sûr de vouloir supprimer "${escapeHtml(itemText)}" ?`,()=>{
data.categories[categoryIndex].items.splice(itemIndex,1);
closeConfirm();
render();
});
}

function deleteCategory(categoryIndex){
let catName=data.categories[categoryIndex].name;
data.categories.splice(categoryIndex,1);
closeConfirm();
render();
}

function deleteSub(categoryIndex,subIndex){
let subName=data.categories[categoryIndex].subs[subIndex];
data.categories[categoryIndex].subs.splice(subIndex,1);
delete data.categories[categoryIndex].subOpen[subName];
closeConfirm();
render();
}

function showConfirm(title,message,onConfirm){
let content=document.getElementById('confirmContent');
content.innerHTML=`<h3>${escapeHtml(title)}</h3>
<p>${escapeHtml(message)}</p>
<div class='confirm-buttons'>
<button class='confirm-btn confirm-btn-cancel' onclick='closeConfirm()'>Annuler</button>
<button class='confirm-btn confirm-btn-danger' onclick='executePendingAction()'>Supprimer</button>
</div>`;
pendingConfirmAction=onConfirm;
document.getElementById('confirmModal').style.display='flex';
}

function executePendingAction(){
if(pendingConfirmAction){
pendingConfirmAction();
pendingConfirmAction=null;
}
}

function closeConfirm(event){
if(event&&event.target.id!=='confirmModal')return;
document.getElementById('confirmModal').style.display='none';
pendingConfirmAction=null;
}

function closeModal(){document.getElementById('modal').style.display='none'}

function addCategory(){

let emoji=document.getElementById('catEmoji').value.trim();

data.categories.push({name:emoji+' '+name,color,open:true,subs:[],items:[],subOpen:{}});

render();
}

function editCategory(idx){
let cat=data.categories[idx];
let baseName=cat.name.replace(/^[^\s]*\s+/,'');
let emoji=cat.name.split(' ')[0];
let c=document.getElementById('modalContent');
c.innerHTML=`<div class='close' onclick='closeModal()'>&times;</div>

<input id='catEmoji' class='input' placeholder='Emoji' value='${escapeHtml(emoji)}'>
${renderCategoryPicker(cat.color)}
<button class='button' onclick='saveEditCategory(${idx})'>Sauvegarder</button>`;

}

let emoji=document.getElementById('catEmoji').value.trim();

<input id='subName' class='input' placeholder='Nom' value='${escapeHtml(sub)}'>
<button class='button' onclick='saveEditSub(${catIdx},${subIdx})'>Sauvegarder</button>`;

}

function render(){
let ctn=document.getElementById('container');
ctn.innerHTML='';

data.categories.forEach((category,categoryIndex)=>{
let div=document.createElement('div');
div.className='category';
div.style.borderLeft=`4px solid ${category.color}`;

// Ajouter dragover et drop au niveau de la catégorie
div.ondragover=(e)=>{
e.preventDefault();
e.dataTransfer.dropEffect='move';
};
div.ondrop=(e)=>{
e.preventDefault();
e.stopPropagation();
};

let title=document.createElement('div');
title.className='category-title';
title.style.display='flex';
title.style.alignItems='center';
title.style.justifyContent='space-between';
let titleLeft=document.createElement('span');
titleLeft.style.flex='1';
titleLeft.style.cursor='pointer';
titleLeft.innerHTML=(category.open?'&#9660; ':'&#9654; ')+escapeHtml(category.name);
titleLeft.onclick=()=>{category.open=!category.open;render()};
title.appendChild(titleLeft);
let titleControls=document.createElement('div');
titleControls.className='category-controls';
titleControls.style.gap='4px';
let editBtn=document.createElement('button');
editBtn.className='edit-btn';
editBtn.innerHTML='✏️';
editBtn.onclick=()=>editCategory(categoryIndex);
titleControls.appendChild(editBtn);
let delBtn=document.createElement('button');
delBtn.className='delete-btn';
delBtn.innerHTML='🗑️';
delBtn.onclick=()=>showConfirm('Supprimer cette catégorie ?','Êtes-vous sûr de vouloir supprimer cette catégorie et tous ses éléments ?',()=>deleteCategory(categoryIndex));
titleControls.appendChild(delBtn);
title.appendChild(titleControls);
div.appendChild(title);

if(category.open){
category.subs.forEach((subName,subIndex)=>{
let subContainer=document.createElement('div');
subContainer.className='sub-header';
subContainer.style.marginLeft='12px';
subContainer.style.marginTop='10px';
subContainer.style.display='flex';
subContainer.style.alignItems='center';
subContainer.style.justifyContent='space-between';

let subLeft=document.createElement('span');
subLeft.style.flex='1';
subLeft.style.cursor='pointer';
subLeft.style.fontWeight='700';
subLeft.style.color='var(--muted)';
subLeft.innerHTML=(category.subOpen[subName]?'&#9660; ':'&#9654; ')+escapeHtml(subName);
subLeft.onclick=()=>{category.subOpen[subName]=!category.subOpen[subName];render()};
subContainer.appendChild(subLeft);

let subControls=document.createElement('div');
subControls.style.display='flex';
subControls.style.alignItems='center';
subControls.style.gap='4px';
subControls.style.opacity='0';
subControls.style.transition='opacity 0.15s';
subContainer.onmouseenter=()=>subControls.style.opacity='1';
subContainer.onmouseout=()=>subControls.style.opacity='0';

let editSubBtn=document.createElement('button');
editSubBtn.className='edit-btn';
editSubBtn.innerHTML='✏️';
editSubBtn.style.opacity='1';
editSubBtn.onclick=()=>editSub(categoryIndex,subIndex);
subControls.appendChild(editSubBtn);

let delSubBtn=document.createElement('button');
delSubBtn.className='delete-btn';
delSubBtn.innerHTML='🗑️';
delSubBtn.style.opacity='1';
delSubBtn.onclick=()=>showConfirm('Supprimer cette sous-catégorie ?',`Êtes-vous sûr de vouloir supprimer "${escapeHtml(subName)}" ?`,()=>deleteSub(categoryIndex,subIndex));
subControls.appendChild(delSubBtn);

subContainer.appendChild(subControls);
div.appendChild(subContainer);

if(category.subOpen[subName]){
let items=category.items.filter(item=>item.sub==subIndex);
items.forEach(itemData=>{
let actualIndex=category.items.indexOf(itemData);

if(dragState.to===actualIndex&&dragState.position==='before')div.appendChild(createDropIndicator());

let item=document.createElement('div');
item.className='item '+itemData.color;
item.dataset.itemIndex=actualIndex;
let isOpen=itemData.open;
if(isOpen)item.classList.add('item-open');
item.draggable=!isOpen;

let itemMain=document.createElement('div');
itemMain.className='item-main '+(isOpen?'not-draggable':'draggable');

let dragSpan=document.createElement('span');
dragSpan.className='drag';
dragSpan.innerHTML='&#8942;&#8942;';

let textSpan=document.createElement('span');
textSpan.className='item-text';
textSpan.textContent=itemData.text||'Sans nom';

let editBtn=document.createElement('button');
editBtn.className='edit-btn';
editBtn.innerHTML='✏️';
editBtn.type='button';
editBtn.onclick=(e)=>{
e.stopPropagation();
editItem(categoryIndex,actualIndex);
};

let deleteBtn=document.createElement('button');
deleteBtn.className='delete-btn';
deleteBtn.innerHTML='✕';
deleteBtn.type='button';
deleteBtn.onclick=(e)=>{
e.stopPropagation();
deleteItem(categoryIndex,actualIndex);
};

itemMain.appendChild(dragSpan);
itemMain.appendChild(textSpan);
itemMain.appendChild(editBtn);
itemMain.appendChild(deleteBtn);

itemMain.onclick=(e)=>{
e.stopPropagation();
toggleItemDetails(categoryIndex,actualIndex);
};

item.appendChild(itemMain);

item.ondragstart=(e)=>{
e.dataTransfer.effectAllowed='move';
e.dataTransfer.setData('text/plain',String(actualIndex));
dragState.from=actualIndex;
dragState.to=actualIndex;
dragState.position='before';
updateDropIndicatorOnly();
};
item.ondragover=(e)=>{
e.preventDefault();
e.dataTransfer.dropEffect='move';
let rect=item.getBoundingClientRect();
let itemHeight=rect.height;
let relativeY=e.clientY-rect.top;
let position=relativeY<itemHeight*0.6?'before':'after';
if(dragState.to!==actualIndex||dragState.position!==position){
dragState.to=actualIndex;
dragState.position=position;
updateDropIndicatorOnly();
}
};
item.ondrop=(e)=>{
e.preventDefault();
e.stopPropagation();
let from=e.dataTransfer.getData('text/plain');
if(dragState.to===actualIndex){
moveItem(categoryIndex,from,actualIndex,dragState.position);
}
resetDragState();
render();
};
item.ondragend=()=>{
resetDragState();
let allIndicators=document.getElementById('container').querySelectorAll('.drop-indicator');
allIndicators.forEach(el=>el.remove());
};

if(itemData.open){
let detail=document.createElement('div');
detail.className='item-detail';
detail.innerHTML=`<div><span class='detail-label'>Nom</span><div class='detail-content'>${escapeHtml(itemData.text||'Non renseigné')}</div></div>
<div class='detail-row'><span class='detail-label'>Coordonnées</span><div class='detail-content'>${escapeHtml(itemData.coords||'Non renseignées')}</div></div>
<div class='detail-row'><span class='detail-label'>Description</span><div class='detail-content'>${escapeHtml(itemData.desc||'Aucune description')}</div></div>`;
item.appendChild(detail);
}

div.appendChild(item);

if(dragState.to===actualIndex&&dragState.position==='after')div.appendChild(createDropIndicator());
});
}
});
}

ctn.appendChild(div);
});
}

function exportHTML() {
    // 1. Copie et fermeture propre pour l'export
    const dataToExport = JSON.parse(JSON.stringify(data));
    dataToExport.categories.forEach(cat => {
        cat.open = true; // On garde les catégories ouvertes
        if (cat.items) {
            cat.items.forEach(item => { item.open = false; }); // On ferme les détails
        }
    });

    // 2. On récupère le code source du script
    let scriptContent = document.querySelector('script').innerHTML;

    // 3. On remplace les données
    // L'ajout de [\\s\\S]*? permet de cibler parfaitement les données même si elles font 1000 lignes
    let updatedScript = scriptContent.replace(
        /let data\s*=\s*\{[\s\S]*?\};/, 
        `let data = ${JSON.stringify(dataToExport)};`
    );

    // 4. CORRECTION DU BUG : On supprime UNIQUEMENT les "render()" en double à la TOUTE FIN du fichier
    // On ne touche plus à l'intérieur des fonctions !
    updatedScript = updatedScript.replace(/(?:\s*render\(\);\s*)+$/, '');

    // 5. On reconstruit un fichier neuf
    const finalHTML = `<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Stryde RP - Roadmap PRO</title>
    ${document.querySelector('style').outerHTML}
</head>
<body>
    <h1>&#128640; Stryde RP - Roadmap</h1>
    <div class="topbar">
        <div class="btn" onclick="openModal('category')">&#10133; Catégorie</div>
        <div class="btn" onclick="openModal('sub')">&#10133; Sous-catégorie</div>
        <div class="btn" onclick="openModal('item')">&#10133; Élément</div>
        <div class="btn" onclick="exportHTML()">&#127760; Export</div>
    </div>
    <div id="container"></div>
    <div class="modal" id="modal" onclick="outsideClick(event)">
        <div class="modal-content" id="modalContent"></div>
    </div>
    <div class="confirm-modal" id="confirmModal" onclick="closeConfirm(event)">
        <div class="confirm-content" id="confirmContent"></div>
    </div>
    <script>
        ${updatedScript}
        
        // Un seul rendu propre à l'ouverture
        render();
    <\/script>
</body>
</html>`;

    // 6. Téléchargement
    const blob = new Blob([finalHTML], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'roadmap_stryde_pro.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
